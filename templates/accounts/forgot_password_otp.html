{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<main class="auth-body">
    <div class="auth-card">

        <div class="auth-logo">SNEAKO</div>

        <div class="auth-header">
            <h2>Verify OTP</h2>
            <p class="text-muted small">
                Enter the OTP sent to your email
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} d-flex align-items-center gap-2 border-0" 
                     style="border-radius: 12px; background-color: rgba(239, 68, 68, 0.1); color: #ef4444; font-size: 0.85rem; padding: 12px 16px; margin-bottom: 24px;">
                    <i data-lucide="alert-circle" style="width: 18px; height: 18px;"></i>
                    <span class="fw-bold">{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'accounts:forgot_password_otp' %}">
            {% csrf_token %}

            <div class="d-flex justify-content-center gap-2 mb-4">
                <input type="text" name="otp1" class="otp-input form-control" maxlength="1" required>
                <input type="text" name="otp2" class="otp-input form-control" maxlength="1" required>
                <input type="text" name="otp3" class="otp-input form-control" maxlength="1" required>
                <input type="text" name="otp4" class="otp-input form-control" maxlength="1" required>
            </div>

            <button type="submit" class="auth-btn w-100">
                Verify OTP
            </button>
        </form>

       <div class="auth-link mt-3">
        Didn’t receive OTP?
        <a href="{% url 'accounts:forgot_resend_otp' %}">Resend</a>
        </div>

    </div>
</main>
{% endblock %}
