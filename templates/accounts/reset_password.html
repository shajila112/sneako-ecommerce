{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<main class="auth-body">
    <div class="auth-card">

        <div class="auth-logo">SNEAKO</div>

        <div class="auth-header">
            <h2>Set New Password</h2>
            <p class="text-muted small">
                Create a strong password to secure your account
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} d-flex align-items-center gap-2 border-0" 
                     style="border-radius: 12px; background-color: rgba(239, 68, 68, 0.1); color: #ef4444; font-size: 0.85rem; padding: 12px 16px; margin-bottom: 24px;">
                    <i data-lucide="alert-circle" style="width: 18px; height: 18px;"></i>
                    <span class="fw-bold">{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'accounts:reset_password' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password"
                       name="password1"
                       id="new-password"
                       class="form-control"
                       required>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input type="password"
                       name="password2"
                       class="form-control"
                       required>
            </div>

            <button type="submit" class="auth-btn w-100">
                Reset Password
            </button>
        </form>

    </div>
</main>
{% endblock %}
