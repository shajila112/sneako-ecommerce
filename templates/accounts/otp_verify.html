{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<main class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">SNEAKO</div>

        <div class="auth-header">
            <h2>Verify OTP</h2>
            <p class="text-muted small">
                We've sent a 4-digit code to your email. Please enter it below.
            </p>
        </div>

        <form method="POST" action="{% url 'accounts:otp_verify' %}">
            {% csrf_token %}

            <!-- OTP INPUTS -->
            <div class="d-flex justify-content-center gap-2 mb-4">
                <input type="text" name="otp1" class="otp-input form-control"
                       maxlength="1" pattern="[0-9]" required>
                <input type="text" name="otp2" class="otp-input form-control"
                       maxlength="1" pattern="[0-9]" required>
                <input type="text" name="otp3" class="otp-input form-control"
                       maxlength="1" pattern="[0-9]" required>
                <input type="text" name="otp4" class="otp-input form-control"
                       maxlength="1" pattern="[0-9]" required>
            </div>

            <!-- PRIMARY CTA -->
            <button type="submit" class="auth-btn w-100 mt-2">
                Verify &amp; Proceed
            </button>

            <!-- SECONDARY ACTIONS -->
            <div class="text-center mt-4">
                <p class="small text-muted mb-2">
                    Didn’t receive code?
                    <a href="{% url 'accounts:resend_otp' %}"
                       class="fw-bold text-decoration-none">
                        Resend
                    </a>
                </p>

                <a href="{% url 'accounts:login' %}"
                   class="small text-decoration-none">
                    Back to Login
                </a>
            </div>
        </form>

    </div>
</main>

<!-- AUTO-FOCUS JS -->
<script>
    const inputs = document.querySelectorAll('.otp-input');

    inputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });
</script>
{% endblock %}
