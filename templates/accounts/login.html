{% extends "auth_base.html" %}

{% load static %}







{% block content %}
<main class="auth-body">
    <div class="auth-card">

        <div class="auth-logo">SNEAKO</div>

        <div class="auth-header">
            <h2>Login to Your Account</h2>
        </div>

        <form method="POST" action="{% url 'accounts:login' %}">
            {% csrf_token %}

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter your email"
                       required>
            </div>

            <!-- PASSWORD + FORGOT -->
            <div class="mb-2 d-flex justify-content-between align-items-center">
                <label class="form-label mb-0">Password</label>
                <a href="{% url 'accounts:forgot_password' %}"
                   class="small text-decoration-none fw-bold">
                    Forgot password?
                </a>
            </div>

            <div class="mb-3">
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       required>
            </div>

            <!-- REMEMBER -->
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label small" for="remember">
                    Remember me
                </label>
            </div>

            <!-- PRIMARY CTA -->
            <button type="submit" class="auth-btn w-100">
                Login
            </button>

            <!-- DIVIDER -->
            <div class="d-flex align-items-center my-4">
                <hr class="flex-grow-1">
                <span class="mx-2 text-muted small">OR</span>
                <hr class="flex-grow-1">
            </div>


        


     
{% load socialaccount %}

<a href="{% provider_login_url 'google' process='login' %}" class="google-btn">
    Continue with Google
</a>

          
        </form>

        <!-- REGISTER LINK -->
        <div class="text-center mt-4">
            <p class="small mb-0">
                Don’t have an account?
                <a href="{% url 'accounts:register' %}"
                   class="fw-bold text-decoration-none">
                    Register
                </a>
            </p>
        </div>

    </div>
</main>
{% endblock %}
