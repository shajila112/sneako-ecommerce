{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<main class="auth-body">
    <div class="auth-card">

        <div class="auth-logo">SNEAKO</div>

        <div class="auth-header">
            <h2>Reset Password</h2>
            <p class="text-muted small">
                Enter your registered email to receive an OTP
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} d-flex align-items-center gap-2 border-0" 
                     style="border-radius: 12px; background-color: rgba(239, 68, 68, 0.1); color: #ef4444; font-size: 0.85rem; padding: 12px 16px; margin-bottom: 24px;">
                    <i data-lucide="alert-circle" style="width: 18px; height: 18px;"></i>
                    <span class="fw-bold">{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'accounts:forgot_password' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="name@example.com"
                       required>
            </div>

            <button type="submit" class="auth-btn w-100">
                Send OTP
            </button>
        </form>

        <div class="auth-link">
            Remembered your password?
            <a href="{% url 'accounts:login' %}">Back to Login</a>
        </div>

    </div>
</main>
{% endblock %}
