{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<main class="auth-body">
    <div class="auth-card">

        <div class="auth-logo">SNEAKO</div>

        <div class="auth-header">
            <h2>Reset Password</h2>
            <p class="text-muted small">
                Enter your registered email to receive an OTP
            </p>
        </div>

        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} small text-center">
                {{ message }}
            </div>
        {% endfor %}

        <form method="POST" action="{% url 'accounts:forgot_password' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="name@example.com"
                       required>
            </div>

            <button type="submit" class="auth-btn w-100">
                Send OTP
            </button>
        </form>

        <div class="auth-link">
            Remembered your password?
            <a href="{% url 'accounts:login' %}">Back to Login</a>
        </div>

    </div>
</main>
{% endblock %}
